rity."},\n  {term:"Cloud Computing", def:"Delivery of IT resources (compute, storage, networking) over the internet on a pay‑as‑you‑go basis."},\n  {term:"Cold Site", def:"A DR facility with basic infrastructure but no pre‑installed hardware or data."},\n  {term:"Compensating Control", def:"An alternative security measure used when the primary control cannot be implemented."},\n  {term:"Confidentiality", def:"The assurance that information is accessible only to authorized individuals."},\n  {term:"Container", def:"A lightweight virtualization technology that packages an application with its dependencies, sharing the host OS kernel."},\n  {term:"Cron", def:"The Linux task scheduler that runs commands or scripts at specified intervals."},\n  {term:"CVE (Common Vulnerabilities and Exposures)", def:"A standardized system for identifying and naming known security vulnerabilities."},\n  {term:"CVSS (Common Vulnerability Scoring System)", def:"A standardized method for rating vulnerability severity on a scale of 0.0 to 10.0."},\n  {term:"Cyber Kill Chain", def:"A model describing the seven stages of a cyber attack, from reconnaissance to actions on objectives."},\n  {term:"Deepfake", def:"AI‑generated synthetic media (audio/video) used for impersonation in social engineering attacks."},\n  {term:"Defense in Depth", def:"A security strategy that uses multiple layers of controls so no single failure compromises security."},\n  {term:"DHCP (Dynamic Host Configuration Protocol)", def:"Automatically assigns IP addresses and network configuration to devices."},\n  {term:"Digital Signature", def:"A cryptographic technique providing authentication, integrity, and non‑repudiation."},\n  {term:"DMZ (Demilitarized Zone)", def:"A network segment between the internet and internal network, hosting public‑facing services."},\n  {term:"DNS (Domain Name System)", def:"Translates domain names into IP addresses."},\n  {term:"Drive‑by Download", def:"Malware that downloads automatically when ics)", def:"Uses machine learning to detect anomalous user and device behavior indicating compromise."},\n  {term:"UPnP (Universal Plug and Play)", def:"A protocol that automatically configures network devices; a security risk when enabled."},\n  {term:"Virus", def:"Malware that attaches to files and requires user action to execute."},\n  {term:"Vishing", def:"Phishing via voice/phone calls."},\n  {term:"VLAN (Virtual Local Area Network)", def:"A logical network segment on a switch that isolates traffic."},\n  {term:"VM Escape", def:"An attack where malware breaks out of a virtual machine to access the hypervisor or host."},\n  {term:"VM Sprawl", def:"Uncontrolled creation of virtual machines that become unmanaged and potentially vulnerable."},\n  {term:"VPN (Virtual Private Network)", def:"Creates an encrypted tunnel for secure remote network access."},\n  {term:"Vulnerability", def:"A weakness in a system that could be exploited by a threat."},\n  {term:"WAF (Web Application Firewall)", def:"A firewall that filters and monitors HTTP traffic to protect web applications."},\n  {term:"Warm Site", def:"A DR facility with hardware installed but requiring data restoration."},\n  {term:"WEP (Wired Equivalent Privacy)", def:"An obsolete, broken wireless security protocol. Never use."},\n  {term:"Whaling", def:"A phishing attack specifically targeting senior executives."},\n  {term:"Worm", def:"Self‑replicating malware that spreads across networks without user interaction."},\n  {term:"WPA2 (Wi‑Fi Protected Access 2)", def:"A wireless security protocol using AES encryption. Acceptable minimum standard."},\n  {term:"WPA3 (Wi‑Fi Protected Access 3)", def:"The latest wireless security protocol using SAE key exchange. Preferred standard."},\n  {term:"XDR (Extended Detection and Response)", def:"Cross‑layer detection and response integrating endpoint, network, cloud, and email telemetry."},\n  {term:"XSS (Cross‑Site Scripting)", def:"A web attack that injects malicious JavaScri
